server {
    listen 127.0.0.1:8744;
    server_name hyperbeam.example.com;
    resolver 1.1.1.1 1.0.0.1 valid=300s ipv6=off;
    absolute_redirect off;
    set $dm_arweave_origin arweave.net;
    # Resolver PID is injected from host file managed by ops deploy flow.
    # This keeps routing generic and avoids hardcoded process IDs in server blocks.
    set $dm_resolver_pid "";
    include /etc/nginx/snippets/darkmesh-resolver-pid.conf;
    # Managed host->process routing projection (AO authority -> nginx map).
    # The sync job writes /etc/nginx/conf.d/darkmesh-host-routing-map.conf in
    # http{} context so nginx can do fast hash-based host lookups instead of a
    # long per-request if-chain in this server block.

    # Internal Arweave gateway shim for HB runtime fetches.
    # Bare 43-char lookups are used for module/device body fetches, so they must
    # resolve to raw tx bytes rather than /tx metadata JSON.
    location ~ "^/__arweave_chain/([A-Za-z0-9_-]{43})$" {
        set $dm_chain_txid $1;
        proxy_pass https://$dm_arweave_origin/raw/$dm_chain_txid;
        proxy_http_version 1.1;
        proxy_pass_request_headers off;
        proxy_ssl_server_name on;
        proxy_ssl_name $dm_arweave_origin;
        proxy_set_header Host $dm_arweave_origin;
        proxy_set_header User-Agent "darkmesh-arweave-chain/1.0";
        proxy_set_header Connection "";
        proxy_cache dm_chain_tx_cache;
        proxy_cache_methods GET HEAD;
        proxy_cache_key "dm-chain-id:$dm_chain_txid";
        proxy_cache_valid 200 301 302 24h;
        proxy_cache_lock on;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_ignore_headers Cache-Control Expires Set-Cookie;
    }

    # Copycat and other HB internals frequently hit explicit /tx/<id> lookups.
    # Keep them local-first via nginx disk cache even when the source is arweave.net.
    location ~ "^/__arweave_chain/tx/([A-Za-z0-9_-]{43})$" {
        set $dm_chain_txid $1;
        proxy_pass https://$dm_arweave_origin/tx/$dm_chain_txid;
        proxy_http_version 1.1;
        proxy_pass_request_headers off;
        proxy_ssl_server_name on;
        proxy_ssl_name $dm_arweave_origin;
        proxy_set_header Host $dm_arweave_origin;
        proxy_set_header Accept application/json;
        proxy_set_header User-Agent "darkmesh-arweave-chain/1.0";
        proxy_set_header Connection "";
        proxy_cache dm_chain_tx_cache;
        proxy_cache_methods GET HEAD;
        proxy_cache_key "dm-chain-tx:$dm_chain_txid";
        proxy_cache_valid 200 301 302 24h;
        proxy_cache_lock on;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_ignore_headers Cache-Control Expires Set-Cookie;
    }

    location /__arweave_chain/ {
        rewrite ^/__arweave_chain/(.*)$ /$1 break;
        proxy_pass https://$dm_arweave_origin;
        proxy_http_version 1.1;
        proxy_pass_request_headers off;
        proxy_ssl_server_name on;
        proxy_ssl_name $dm_arweave_origin;
        proxy_set_header Host $dm_arweave_origin;
        proxy_set_header Accept application/json;
        proxy_set_header User-Agent "darkmesh-arweave-chain/1.0";
        proxy_set_header Connection "";
    }

    # Arweave parity routes: proxy directly to arweave.net.
    # Keep this explicit in nginx to avoid local non-mining parity drift.
    location = /graphql {
        proxy_pass https://$dm_arweave_origin$request_uri;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_ssl_name $dm_arweave_origin;
        proxy_set_header Host $dm_arweave_origin;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /raw/ {
        proxy_pass https://$dm_arweave_origin;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_ssl_name $dm_arweave_origin;
        proxy_set_header Host $dm_arweave_origin;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /tx/ {
        proxy_pass https://$dm_arweave_origin;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_ssl_name $dm_arweave_origin;
        proxy_set_header Host $dm_arweave_origin;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /arweave/ {
        rewrite ^/arweave/(.*)$ /$1 break;
        proxy_pass https://$dm_arweave_origin;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_ssl_name $dm_arweave_origin;
        proxy_set_header Host $dm_arweave_origin;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Do NOT hard-route generic 43-char paths here.
    # They can represent scheduler/cache object IDs (not only Arweave tx IDs),
    # and forcing them to arweave.net breaks local scheduler readback.
    # For scheduler hashpaths, pin Host to loopback so local object resolution
    # does not depend on public host-based alias routing.
    location ~ "^/([A-Za-z0-9_-]{43})/([A-Za-z0-9_-]{43})(?:\\?.*)?$" {
        set $dm_hashpath_tail $2;
        proxy_pass http://127.0.0.1:8734$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Accept application/json;
        proxy_set_header Host 127.0.0.1;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Scheduler parity fallback:
        # prefer canonical "A/B", but if this profile exposes only "B",
        # retry with tail segment to avoid loadMessages failures.
        proxy_intercept_errors on;
        error_page 404 = @hashpath_tail_fallback;
        proxy_buffer_size 128k;
        proxy_buffers 16 128k;
        proxy_busy_buffers_size 256k;
    }

    location @hashpath_tail_fallback {
        proxy_pass http://127.0.0.1:8734/$dm_hashpath_tail$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header Accept application/json;
        proxy_set_header Host 127.0.0.1;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffer_size 128k;
        proxy_buffers 16 128k;
        proxy_busy_buffers_size 256k;
    }

    # Legacy resolver/process probe guard:
    # old darkmesh resolver PIDs are intentionally retired; serve 410 to avoid
    # bubbling HB 5xx from stale client probes.
    location ~ "^/(kdOo7yopPisflX2e45QwGmBWb1WZp_HB5QrRyANFFIo|ex4PhH4cb48ppx4JIra_DzCHgCgUVlJPxHd1H7DG9As|CpYAM1of3M-xlbNqOo2Rj_WRsAW_VzbNE6F_mQh2lic|HV1d8Jrknb8kWTpIvCAtJWrN-vg3nYBHkl_uQUuOzRI|dEibUB5gwTp_plw4GhVj3Snz8Sfrj9rHiZYLjD4nJ7A|8z6_TrI3vqWn9EnsY5xU8R7axE44k6p-4yiMuwL2FUw)~process@1\.0/(now|compute|slot(?:/current)?)" {
        return 410;
    }

    # Resolver compatibility shims:
    # serve stable JSON from the local projection-backed adapter instead of
    # relying on stock HB alias execution, which still emits placeholder bodies
    # on this small HB-only runtime.
    location = /~darkmesh-resolver@1.0 {
        proxy_pass http://127.0.0.1:8760/~darkmesh-resolver@1.0;
        proxy_http_version 1.1;
        proxy_set_header Accept application/json;
        proxy_set_header Host 127.0.0.1;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffer_size 1m;
        proxy_buffers 8 1m;
        proxy_busy_buffers_size 2m;
    }

    location = /~darkmesh-resolver@1.0/ {
        proxy_pass http://127.0.0.1:8760/~darkmesh-resolver@1.0/;
        proxy_http_version 1.1;
        proxy_set_header Accept application/json;
        proxy_set_header Host 127.0.0.1;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffer_size 1m;
        proxy_buffers 8 1m;
        proxy_busy_buffers_size 2m;
    }

    location = /~darkmesh-resolver@1.0/GetResolverState {
        proxy_pass http://127.0.0.1:8760/~darkmesh-resolver@1.0/GetResolverState;
        proxy_http_version 1.1;
        proxy_set_header Accept application/json;
        proxy_set_header Host 127.0.0.1;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffer_size 1m;
        proxy_buffers 8 1m;
        proxy_busy_buffers_size 2m;
    }

    location = /~darkmesh-resolver@1.0/resolve {
        if ($arg_host !~ "^[A-Za-z0-9.-]{1,253}$") {
            return 400;
        }
        # Keep arg_path safe for query forwarding; disallow '&' and '=' to avoid query injection.
        if ($arg_path !~ "^/[A-Za-z0-9._~!$'()*+,;:@%/-]*$") {
            return 400;
        }
        proxy_pass http://127.0.0.1:8760/~darkmesh-resolver@1.0/resolve?host=$arg_host&path=$arg_path&method=GET;
        proxy_http_version 1.1;
        proxy_set_header Accept application/json;
        proxy_set_header Host 127.0.0.1;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffer_size 1m;
        proxy_buffers 8 1m;
        proxy_busy_buffers_size 2m;
    }

    location ~ ^/~darkmesh-resolver@1\.0(?<resolver_suffix>/.*)?$ {
        proxy_pass http://127.0.0.1:8760;
        proxy_http_version 1.1;
        proxy_set_header Accept application/json;
        proxy_set_header Host 127.0.0.1;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffer_size 1m;
        proxy_buffers 8 1m;
        proxy_busy_buffers_size 2m;
    }

    location = /~cache@1.0/read {
        # Invalid cache-read shape (missing/invalid target) must not count as 5xx.
        if ($arg_target !~ "^[A-Za-z0-9_-]{43}$") {
            return 400;
        }

        # Canonicalize query shape: only forward target=<txid> to avoid user-supplied
        # codec or extra params causing avoidable HB 500s on binary payloads.
        proxy_pass http://127.0.0.1:8734/~cache@1.0/read?target=$arg_target;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffer_size 128k;
        proxy_buffers 16 128k;
        proxy_busy_buffers_size 256k;
        # Fail fast on pathological local cache-read hangs so the remote
        # fallback can serve a cached response in seconds instead of after a
        # 30-50s HB stall.
        proxy_connect_timeout 1s;
        proxy_send_timeout 3s;
        proxy_read_timeout 3s;

        # Temporary guard for stock ~cache behavior: avoid bubbling false 404s or 5xx
        # when HB cannot serialize or resolve a valid cache target locally.
        proxy_intercept_errors on;
        error_page 404 500 502 504 = @cache_read_remote_fallback;
    }

    location @cache_read_remote_fallback {
        proxy_pass https://arweave.net/raw/$arg_target;
        proxy_http_version 1.1;
        proxy_pass_request_headers off;
        proxy_ssl_server_name on;
        proxy_set_header Host arweave.net;
        proxy_set_header Accept "*/*";
        proxy_set_header User-Agent "darkmesh-nginx-cache-fallback/1.0";
        proxy_set_header Connection "";
        proxy_cache dm_cache_read_fallback_cache;
        proxy_cache_methods GET HEAD;
        proxy_cache_key "dm-cache-read:$arg_target";
        proxy_cache_valid 200 24h;
        proxy_cache_lock on;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_ignore_headers Cache-Control Expires Set-Cookie;
    }

    location / {
        proxy_pass http://127.0.0.1:8734$dm_host_target_prefix$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffer_size 32k;
        proxy_buffers 8 32k;
        proxy_busy_buffers_size 64k;
    }
}
