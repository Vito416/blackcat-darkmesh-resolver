server {
    listen 127.0.0.1:8745;
    server_name write.darkmesh.fun;
    absolute_redirect off;
    resolver 1.1.1.1 1.0.0.1 valid=300s ipv6=off;
    set $dm_arweave_origin arweave.net;
    client_max_body_size 20m;
    # Resolver PID is injected from host file managed by ops deploy flow.
    # This keeps routing generic and avoids hardcoded process IDs in server blocks.
    set $dm_resolver_pid "";
    include /etc/nginx/snippets/darkmesh-resolver-pid.conf;

    # Internal Arweave gateway shim for scheduler/process module fetches.
    # Bare 43-char module lookups must resolve to raw tx bytes; /tx metadata JSON
    # is kept on the explicit /tx/* path instead.
    location ~ "^/__arweave_chain/([A-Za-z0-9_-]{43})$" {
        set $dm_chain_txid $1;
        proxy_pass https://$dm_arweave_origin/raw/$dm_chain_txid;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_ssl_name $dm_arweave_origin;
        proxy_set_header Host $dm_arweave_origin;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /__arweave_chain/ {
        rewrite ^/__arweave_chain/(.*)$ /$1 break;
        proxy_pass https://$dm_arweave_origin;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_ssl_name $dm_arweave_origin;
        proxy_set_header Host $dm_arweave_origin;
        proxy_set_header Accept application/json;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Drop common scanner noise before it reaches HyperBEAM.
    location ~* ^/(wp-admin|wordpress|xmlrpc\.php|\.git) {
        return 444;
    }

    # Push-style endpoints must be POST to avoid noisy 500s on malformed probes.
    location = /push {
        if ($request_method != POST) {
            return 405;
        }
        proxy_pass http://127.0.0.1:8734;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /~process@1.0/push {
        if ($request_method != POST) {
            return 405;
        }
        proxy_pass http://127.0.0.1:8734;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Resolver compatibility shims:
    # serve stable JSON from the local projection-backed adapter instead of
    # relying on stock HB alias execution, which still emits placeholder bodies
    # on this small HB-only runtime.
    location = /~darkmesh-resolver@1.0 {
        proxy_pass http://127.0.0.1:8760/~darkmesh-resolver@1.0;
        proxy_http_version 1.1;
        proxy_set_header Accept application/json;
        proxy_set_header Host 127.0.0.1;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffer_size 1m;
        proxy_buffers 8 1m;
        proxy_busy_buffers_size 2m;
    }

    location = /~darkmesh-resolver@1.0/ {
        proxy_pass http://127.0.0.1:8760/~darkmesh-resolver@1.0/;
        proxy_http_version 1.1;
        proxy_set_header Accept application/json;
        proxy_set_header Host 127.0.0.1;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffer_size 1m;
        proxy_buffers 8 1m;
        proxy_busy_buffers_size 2m;
    }

    location = /~darkmesh-resolver@1.0/GetResolverState {
        proxy_pass http://127.0.0.1:8760/~darkmesh-resolver@1.0/GetResolverState;
        proxy_http_version 1.1;
        proxy_set_header Accept application/json;
        proxy_set_header Host 127.0.0.1;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffer_size 1m;
        proxy_buffers 8 1m;
        proxy_busy_buffers_size 2m;
    }

    location = /~darkmesh-resolver@1.0/resolve {
        if ($arg_host !~ "^[A-Za-z0-9.-]{1,253}$") {
            return 400;
        }
        # Keep arg_path safe for query forwarding; disallow '&' and '=' to avoid query injection.
        if ($arg_path !~ "^/[A-Za-z0-9._~!$'()*+,;:@%/-]*$") {
            return 400;
        }
        proxy_pass http://127.0.0.1:8760/~darkmesh-resolver@1.0/resolve?host=$arg_host&path=$arg_path&method=GET;
        proxy_http_version 1.1;
        proxy_set_header Accept application/json;
        proxy_set_header Host 127.0.0.1;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffer_size 1m;
        proxy_buffers 8 1m;
        proxy_busy_buffers_size 2m;
    }

    # Resolver process compute may fetch scheduler metadata from the node's public
    # scheduler-location. Force JSON shape even when upstream client sends no Accept.
    location ^~ /~scheduler@1.0/ {
        proxy_pass http://127.0.0.1:8734;
        proxy_http_version 1.1;
        proxy_set_header Accept application/json;
        proxy_set_header Host 127.0.0.1;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Some runtimes emit scheduler object reads as /~scheduler@1.0/<id>,
        # while this node resolves them only as /<id>. Keep canonical path
        # first and retry stripped path on 404 for object/hashpath tails.
        proxy_intercept_errors on;
        error_page 404 = @scheduler_object_tail_fallback;
        proxy_buffer_size 128k;
        proxy_buffers 16 128k;
        proxy_busy_buffers_size 256k;
    }

    location @scheduler_object_tail_fallback {
        # Strip scheduler prefix only for object-like tails, otherwise keep 404.
        set $dm_sched_object "";
        if ($uri ~ "^/~scheduler@1\\.0/[A-Za-z0-9_-]{43}/([A-Za-z0-9_-]{43})$") {
            set $dm_sched_object $1;
        }
        if ($uri ~ "^/~scheduler@1\\.0/([A-Za-z0-9_-]{43})$") {
            set $dm_sched_object $1;
        }
        if ($dm_sched_object = "") {
            return 404;
        }
        proxy_pass http://127.0.0.1:8734/$dm_sched_object$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header Accept application/json;
        proxy_set_header Host 127.0.0.1;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffer_size 128k;
        proxy_buffers 16 128k;
        proxy_busy_buffers_size 256k;
    }

    # Scheduler base-hashpaths are usually two 43-char segments.
    # Keep Host internal so HB resolves the local object path, not host-routed alias logic.
    location ~ "^/([A-Za-z0-9_-]{43})/([A-Za-z0-9_-]{43})(?:\\?.*)?$" {
        set $dm_hashpath_tail $2;
        proxy_pass http://127.0.0.1:8734$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Accept application/json;
        proxy_set_header Host 127.0.0.1;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Some scheduler responses return base-hashpath "A/B" while only "B"
        # is resolvable on this profile. Keep canonical path first, then
        # fallback to tail segment on 404 to unblock loadMessages.
        proxy_intercept_errors on;
        error_page 404 = @hashpath_tail_fallback;
        proxy_buffer_size 128k;
        proxy_buffers 16 128k;
        proxy_busy_buffers_size 256k;
    }

    location @hashpath_tail_fallback {
        proxy_pass http://127.0.0.1:8734/$dm_hashpath_tail$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header Accept application/json;
        proxy_set_header Host 127.0.0.1;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffer_size 128k;
        proxy_buffers 16 128k;
        proxy_busy_buffers_size 256k;
    }

    # Scheduler assignment/message links are often bare 43-char IDs.
    # Force JSON accept so internal loadMessages fetches do not receive Hyperbuddy HTML.
    location ~ "^/[A-Za-z0-9_-]{43}(?:\\?.*)?$" {
        proxy_pass http://127.0.0.1:8734$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Accept application/json;
        proxy_set_header Host 127.0.0.1;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Some object responses carry large commitment headers; keep enough
        # proxy buffer budget to avoid 502 "upstream sent too big header".
        proxy_buffer_size 128k;
        proxy_buffers 16 128k;
        proxy_busy_buffers_size 256k;
    }

    location ~ ^/~darkmesh-resolver@1\.0(?<resolver_suffix>/.*)?$ {
        proxy_pass http://127.0.0.1:8760;
        proxy_http_version 1.1;
        proxy_set_header Accept application/json;
        proxy_set_header Host 127.0.0.1;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffer_size 1m;
        proxy_buffers 8 1m;
        proxy_busy_buffers_size 2m;
    }

    # Guard malformed legacy compute paths that otherwise bubble as noisy 5xx.
    location ~ "^/[A-Za-z0-9_-]{43}~process@1\\.0/compute/(?:now|results/latest|[0-9]+)$" {
        return 400;
    }

    location ~ "^/[A-Za-z0-9_-]{43}~process@1\\.0/compute=0(?:\\?.*)?$" {
        return 400;
    }

    location / {
        proxy_pass http://127.0.0.1:8734;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffer_size 32k;
        proxy_buffers 8 32k;
        proxy_busy_buffers_size 64k;
    }
}
